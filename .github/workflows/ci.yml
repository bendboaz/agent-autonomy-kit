name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate plugin + marketplace JSON parse
        run: python -c "import json; json.load(open('.claude-plugin/marketplace.json')); json.load(open('plugins/agent-ops/.claude-plugin/plugin.json')); print('manifests OK')"

  pester:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/agent-ops
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser
      - name: Run Pester
        shell: pwsh
        run: Invoke-Pester -CI -Path tests

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/agent-ops
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt pytest
      - run: pytest tests
